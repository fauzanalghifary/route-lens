# fly.toml app configuration file generated for route-lens-api on 2026-06-28T19:46:41+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'route-lens-api'
primary_region = 'sin'

[build]
  dockerfile = 'api/Dockerfile'

[deploy]
  release_command = 'pnpm exec prisma migrate deploy'

[env]
  PORT = '3001'
  WEB_ORIGINS = 'https://route-lens-web.fly.dev'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
