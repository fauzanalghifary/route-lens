# fly.toml app configuration file generated for route-lens-web on 2026-06-28T19:46:59+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'route-lens-web'
primary_region = 'sin'

[build]
  dockerfile = 'web/Dockerfile'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://route-lens-api.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
